<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗЭТА</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#F2EDE4; display:flex; align-items:center; justify-content:center; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const SZ  = 600; // логический размер
const dpr = window.devicePixelRatio || 1;
cv.width  = SZ * dpr;
cv.height = SZ * dpr;
cv.style.width  = Math.min(SZ, window.innerWidth  - 32) + 'px';
cv.style.height = Math.min(SZ, window.innerHeight - 32) + 'px';
ctx.scale(dpr, dpr);

const cx = SZ/2, cy = SZ/2;
const R  = SZ * 0.26;

// Цвета
const GOLD_D  = '#9A7830';
const GOLD    = '#C9A84C';
const GOLD_L  = '#ECC350';
const GOLD_HL = '#F5DC88';
const MUTED   = '#8A7A68';

function ease(t)   { return 1 - Math.pow(1-t, 3); }
function easeQ(t)  { return 1 - Math.pow(1-t, 5); }
function prog(e,a,b){ return Math.max(0, Math.min(1, (e-a)/(b-a))); }

function goldGrad(x, w) {
  const g = ctx.createLinearGradient(x, 0, x+w, 0);
  g.addColorStop(0,    GOLD_D);
  g.addColorStop(0.3,  GOLD);
  g.addColorStop(0.5,  GOLD_HL);
  g.addColorStop(0.7,  GOLD_L);
  g.addColorStop(1,    GOLD_D);
  return g;
}

let t0 = null;
const DUR = 4200;

function draw(ts) {
  if (!t0) t0 = ts;
  const e = ts - t0;

  // ── ФОН ───────────────────────────────────────────────
  ctx.clearRect(0, 0, SZ, SZ);
  ctx.fillStyle = '#F2EDE4';
  ctx.fillRect(0, 0, SZ, SZ);

  // виньетка
  const vig = ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, SZ*0.72);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.07)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, SZ, SZ);

  // Тонкие концентрические круги-орнамент
  for (let r of [R*0.55, R*1.0, R*1.45]) {
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // ── 1. КОЛЬЦО (0–900ms) ───────────────────────────────
  const rP = easeQ(prog(e, 0, 900));

  // свечение
  if (rP > 0) {
    ctx.save();
    ctx.globalAlpha = rP * 0.15;
    const gl = ctx.createRadialGradient(cx,cy,R*0.6, cx,cy,R*1.4);
    gl.addColorStop(0, GOLD_L); gl.addColorStop(1, 'transparent');
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(cx, cy, R*1.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // само кольцо
  if (rP > 0) {
    ctx.save();
    ctx.globalAlpha = rP;
    ctx.lineWidth   = 7;
    ctx.lineCap     = 'round';
    ctx.shadowColor = GOLD_L;
    ctx.shadowBlur  = 12;
    ctx.strokeStyle = goldGrad(cx - R, R * 2);
    ctx.beginPath();
    ctx.arc(cx, cy, R, -Math.PI/2, -Math.PI/2 + Math.PI*2*rP);
    ctx.stroke();
    ctx.restore();
  }

  // 4 ромбика-засечки на кольце
  const diamP = ease(prog(e, 800, 1200));
  if (diamP > 0) {
    [0, 0.25, 0.5, 0.75].forEach(f => {
      const a = -Math.PI/2 + Math.PI*2*f;
      const dx = cx + Math.cos(a)*R;
      const dy = cy + Math.sin(a)*R;
      const s  = 5 * diamP;
      ctx.save();
      ctx.globalAlpha = diamP * 0.85;
      ctx.fillStyle   = GOLD_L;
      ctx.shadowColor = GOLD;
      ctx.shadowBlur  = 6;
      ctx.translate(dx, dy); ctx.rotate(Math.PI/4);
      ctx.fillRect(-s/2, -s/2, s, s);
      ctx.restore();
    });
  }

  // ── 2. БУКВА «З» по центру (300–1000ms) ───────────────
  const zP = easeQ(prog(e, 300, 1000));
  if (zP > 0) {
    // свечение под буквой
    ctx.save();
    ctx.globalAlpha = zP * 0.2;
    const zg = ctx.createRadialGradient(cx,cy,0, cx,cy,R*0.5);
    zg.addColorStop(0, GOLD_L); zg.addColorStop(1, 'transparent');
    ctx.fillStyle = zg; ctx.beginPath(); ctx.arc(cx,cy,R*0.5,0,Math.PI*2); ctx.fill();
    ctx.restore();

    const fz = R * 1.1;
    ctx.save();
    ctx.globalAlpha  = zP;
    ctx.font         = `300 ${fz}px 'Times New Roman', Georgia, serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = GOLD;
    ctx.shadowBlur   = 20 * zP;
    ctx.fillStyle    = goldGrad(cx - fz*0.35, fz*0.7);
    ctx.fillText('З', cx, cy + fz*0.04);
    ctx.restore();
  }

  // ── 3. СВЕТОВОЙ ЛУЧ (1100–1700ms) ───────────────────
  const swP = prog(e, 1100, 1700);
  if (swP > 0 && swP < 1) {
    const peak = swP < 0.5 ? swP*2 : 2 - swP*2;
    const bx = cx - SZ*0.85 + SZ*1.7*swP;
    const by = cy + SZ*0.45 - SZ*0.9*swP;

    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(Math.atan2(-0.9, 1));
    const bLen = SZ * 1.5, bW = SZ * 0.065;

    const bg = ctx.createLinearGradient(0,-bW,0,bW);
    bg.addColorStop(0,   'transparent');
    bg.addColorStop(0.3, `rgba(240,210,120,${0.12*peak})`);
    bg.addColorStop(0.5, `rgba(255,240,170,${0.5*peak})`);
    bg.addColorStop(0.7, `rgba(240,210,120,${0.12*peak})`);
    bg.addColorStop(1,   'transparent');
    ctx.fillStyle = bg; ctx.fillRect(-bLen/2,-bW,bLen,bW*2);

    const cg = ctx.createLinearGradient(0,-1,0,1);
    cg.addColorStop(0,'transparent');
    cg.addColorStop(0.5,`rgba(255,250,220,${0.9*peak})`);
    cg.addColorStop(1,'transparent');
    ctx.fillStyle = cg; ctx.fillRect(-bLen/2,-2,bLen,4);
    ctx.restore();

    // блик в точке пересечения
    const fp = Math.exp(-Math.pow((swP-0.44)*7, 2));
    if (fp > 0.02) {
      ctx.save();
      ctx.globalAlpha = fp * 0.6;
      const fg = ctx.createRadialGradient(bx,by,0, bx,by,R*0.4);
      fg.addColorStop(0,'rgba(255,248,200,1)');
      fg.addColorStop(0.5,`rgba(236,195,80,0.3)`);
      fg.addColorStop(1,'transparent');
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(bx,by,R*0.4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── 4. ТЕКСТ «ЗЭТА» (1600–2200ms) ────────────────────
  const tP = easeQ(prog(e, 1600, 2200));
  if (tP > 0) {
    const ft  = SZ * 0.082;
    const ty  = cy + R * 1.52;
    const off = (1-tP) * 14;

    ctx.save();
    ctx.globalAlpha  = tP;
    ctx.font         = `normal ${ft}px 'Times New Roman', Georgia, serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = GOLD;
    ctx.shadowBlur   = 14;
    ctx.fillStyle    = goldGrad(cx - ft*1.2, ft*2.4);
    ctx.fillText('ЗЭТА', cx, ty + off);
    ctx.restore();

    // линии по бокам
    const lP = ease(prog(e, 1900, 2400));
    if (lP > 0) {
      ctx.save();
      ctx.globalAlpha = lP * 0.5;
      ctx.strokeStyle = GOLD;
      ctx.lineWidth   = 0.9;
      const gap = ft * 1.2, ll = SZ*0.1*lP;
      ctx.beginPath(); ctx.moveTo(cx-gap-ll, ty); ctx.lineTo(cx-gap, ty); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+gap, ty);    ctx.lineTo(cx+gap+ll, ty); ctx.stroke();
      ctx.restore();
    }
  }

  // ── 5. ПОДПИСЬ (2200–2800ms) ──────────────────────────
  const sP = easeQ(prog(e, 2200, 2800));
  if (sP > 0) {
    const fs = SZ * 0.022;
    const sy = cy + R*1.52 + SZ*0.082*0.72;
    const off = (1-sP)*10;

    // черта
    const lP = ease(prog(e, 2100, 2600));
    ctx.save();
    ctx.globalAlpha = lP * 0.3;
    ctx.strokeStyle = GOLD; ctx.lineWidth = 0.5;
    const lw = SZ*0.18*lP;
    ctx.beginPath(); ctx.moveTo(cx-lw, sy-fs*1.4); ctx.lineTo(cx+lw, sy-fs*1.4); ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha  = sP * 0.65;
    ctx.font         = `${fs}px 'Times New Roman', serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = MUTED;
    ctx.fillText('Ж И Л О Й   К В А Р Т А Л   ·   К Е М Е Р О В О', cx, sy + off);
    ctx.restore();
  }

  // ── 6. IDLE пульс кольца (3200ms+) ───────────────────
  if (e > 3200) {
    const ip = Math.min(1, (e-3200)/600);
    const pulse = (Math.sin((e-3200)/1000 * Math.PI * 1.1)*0.5+0.5) * 0.07 * ip;
    ctx.save();
    ctx.globalAlpha = pulse;
    const pg = ctx.createRadialGradient(cx,cy,R*0.7, cx,cy,R*1.3);
    pg.addColorStop(0, GOLD_L); pg.addColorStop(1,'transparent');
    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(cx,cy,R*1.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if (e < DUR) {
    requestAnimationFrame(draw);
  } else {
    setTimeout(() => { t0 = null; requestAnimationFrame(draw); }, 2000);
  }
}

requestAnimationFrame(draw);
</script>
</body>
</html>
